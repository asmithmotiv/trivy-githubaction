# Overly permissive RBAC for Trivy scanning demo
apiVersion: v1
kind: ServiceAccount
metadata:
  name: overprivileged-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin-clone
rules:
  - apiGroups: ["*"]      # Trivy: wildcard API groups
    resources: ["*"]      # Trivy: wildcard resources
    verbs: ["*"]          # Trivy: wildcard verbs (full cluster access)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: overprivileged-binding
subjects:
  - kind: ServiceAccount
    name: overprivileged-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin-clone
  apiGroup: rbac.authorization.k8s.io
