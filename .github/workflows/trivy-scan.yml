name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # 1. Filesystem scan — secrets, IaC misconfigs, vuln deps
  # -------------------------------------------------------
  trivy-fs-scan:
    name: Filesystem Scan (IaC + Secrets + Deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'   # don't fail the workflow — we want to see all results

      - name: Upload filesystem SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

      - name: Also print table output to logs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

  # -------------------------------------------------------
  # 2. Build and scan the Docker image
  # -------------------------------------------------------
  trivy-image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trivy-demo:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'trivy-demo:${{ github.sha }}'
          scanners: 'vuln,secret'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload image SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Print image scan table to logs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'trivy-demo:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # -------------------------------------------------------
  # 3. IaC-only scan with JSON output (for artifact review)
  # -------------------------------------------------------
  trivy-iac-scan:
    name: IaC Misconfiguration Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan on terraform/
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          format: 'sarif'
          output: 'trivy-terraform-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-terraform-results.sarif') != ''
        with:
          sarif_file: 'trivy-terraform-results.sarif'
          category: 'trivy-terraform'

      - name: Run Trivy IaC scan on kubernetes/
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'kubernetes/'
          format: 'sarif'
          output: 'trivy-k8s-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Kubernetes SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-k8s-results.sarif') != ''
        with:
          sarif_file: 'trivy-k8s-results.sarif'
          category: 'trivy-kubernetes'

      - name: Print IaC table output to logs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
