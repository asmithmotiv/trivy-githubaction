name: Grype Security Scan

on:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # 1. Filesystem / dependency scan
  # -------------------------------------------------------
  grype-fs-scan:
    name: Filesystem Scan (Deps)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype filesystem scan (SARIF)
        run: grype dir:. --output sarif --file grype-fs-results.sarif --fail-on medium || true

      - name: Print filesystem scan table to logs
        run: grype dir:. --output table --fail-on medium || true

      - name: Upload filesystem SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('grype-fs-results.sarif') != ''
        with:
          sarif_file: grype-fs-results.sarif
          category: grype-filesystem

  # -------------------------------------------------------
  # 2. Docker image scan
  # -------------------------------------------------------
  grype-image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t grype-demo:${{ github.sha }} .

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype image scan (SARIF)
        run: grype grype-demo:${{ github.sha }} --output sarif --file grype-image-results.sarif --fail-on high || true

      - name: Print image scan table to logs
        run: grype grype-demo:${{ github.sha }} --output table --fail-on high || true

      - name: Upload image SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('grype-image-results.sarif') != ''
        with:
          sarif_file: grype-image-results.sarif
          category: grype-image
